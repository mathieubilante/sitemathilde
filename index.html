<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathildeShop</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: Arial, sans-serif; background:#f5f5f5; color:#333; }
a { text-decoration:none; color:inherit; }
button { cursor:pointer; }

header { background:#111; color:#fff; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
header h1 { font-size:1.8rem; }
header nav a { margin-left:1rem; color:#fff; }

#user-form { margin:1rem auto; max-width:400px; background:#fff; padding:1rem; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
#user-form input { width:100%; padding:0.5rem; margin-bottom:0.5rem; border-radius:5px; border:1px solid #ccc;}
#user-form button { width:100%; padding:0.5rem; border:none; border-radius:6px; background:#111; color:#fff; font-weight:bold;}
#user-form button:hover{background:#444;}

main { display:flex; max-width:1200px; margin:2rem auto; gap:2rem; flex-wrap:wrap; }
.products-grid { flex:2; display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:1.5rem; }
.products-grid article { background:#fff; border-radius:10px; padding:1rem; box-shadow:0 2px 6px rgba(0,0,0,0.1); display:flex; flex-direction:column; }
.products-grid .product-img { height:150px; background:#eee; border-radius:8px; margin-bottom:1rem; display:flex; align-items:center; justify-content:center; font-weight:bold; color:#888; }
.products-grid h2 { font-size:1.1rem; margin-bottom:0.5rem; }
.products-grid p { font-size:0.9rem; margin-bottom:0.5rem; color:#555; }
.products-grid .price-btn { margin-top:auto; display:flex; justify-content:space-between; align-items:center; }
.products-grid button { padding:0.4rem 0.8rem; border:none; background:#111; color:#fff; border-radius:5px; transition:0.2s; }
.products-grid button:hover { background:#444; }

aside.cart { flex:1; background:#fff; border-radius:10px; padding:1rem; box-shadow:0 2px 6px rgba(0,0,0,0.1); min-width:300px; }
aside.cart h3 { margin-bottom:1rem; }
.cart-item { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem; padding-bottom:0.5rem; border-bottom:1px solid #eee; }
.cart-item div { display:flex; flex-direction:column; }
.cart-item button { margin-left:3px; padding:0.2rem 0.5rem; border-radius:4px; border:1px solid #333; background:#fff; }
.cart-total { display:flex; justify-content:space-between; margin-top:1rem; font-weight:bold; }
#checkout-btn { width:100%; margin-top:0.5rem; padding:0.6rem; border:none; border-radius:6px; background:#111; color:#fff; font-weight:bold; transition:0.2s; }
#checkout-btn:hover { background:#444; }

footer { text-align:center; padding:1rem; font-size:0.8rem; color:#555; margin-top:2rem; }

@media(max-width:800px){
    main { flex-direction:column; }
    aside.cart { min-width:100%; }
}
</style>
</head>
<body>

<header>
  <h1>MathildeShop</h1>
  <nav>
    <a href="#">Accueil</a>
    <a href="#">Produits</a>
    <a href="#">Panier</a>
  </nav>
</header>

<div id="user-form">
  <h3 id="user-title">Inscription</h3>
  <input type="text" id="username" placeholder="Nom d'utilisateur">
  <input type="password" id="password" placeholder="Mot de passe">
  <button id="user-btn">S'inscrire</button>
  <p style="margin-top:0.5rem; font-size:0.9rem;">
    <span id="toggle-user" style="color:blue; cursor:pointer;">Vous avez déjà un compte ? Connectez-vous</span>
  </p>
</div>

<main>
  <section id="products" class="products-grid"></section>

  <aside id="cart" class="cart">
    <h3>Panier (0)</h3>
    <div id="cart-items"><p>Panier vide</p></div>
    <div class="cart-total">
      <span>Total :</span>
      <strong id="cart-total">0.00 €</strong>
    </div>
    <button id="checkout-btn">Commander (simul.)</button>
  </aside>
</main>

<footer>
  Prototype créé pour démo • N'utilisez pas ce code en production sans audit & paiement sécurisé
</footer>

<script>
// Produits (18)
const sampleProducts = [
  { id:1, title:"Sneakers Classic", price:49.99, desc:"Confortables et stylées" },
  { id:2, title:"Casquette Pro", price:19.99, desc:"Coton premium" },
  { id:3, title:"Sac à dos Voyage", price:69.99, desc:"Imperméable, 20L" },
  { id:4, title:"T-shirt Sport", price:24.99, desc:"Coton respirant" },
  { id:5, title:"Montre Casual", price:89.99, desc:"Étanche 50m" },
  { id:6, title:"Lunettes Soleil", price:39.99, desc:"Protection UV400" },
  { id:7, title:"Veste Hiver", price:119.99, desc:"Chaud et léger" },
  { id:8, title:"Chaussures Running", price:59.99, desc:"Légères et confortables" },
  { id:9, title:"Sac à main Élégant", price:79.99, desc:"Cuir synthétique de qualité" },
  { id:10, title:"Pull Col V", price:34.99, desc:"Laine douce et chaude" },
  { id:11, title:"Jeans Slim", price:49.99, desc:"Coupe moderne et confortable" },
  { id:12, title:"Baskets Montantes", price:69.99, desc:"Style urbain" },
  { id:13, title:"Chapeau Panama", price:29.99, desc:"Style vacances" },
  { id:14, title:"Ceinture en cuir", price:24.99, desc:"Couleur marron" },
  { id:15, title:"Écharpe Hiver", price:19.99, desc:"Douce et longue" },
  { id:16, title:"Chaussures Été", price:54.99, desc:"Confortables et légères" },
  { id:17, title:"Sacoche Ordinateur", price:89.99, desc:"Pour ordinateur 15 pouces" },
  { id:18, title:"T-shirt Casual", price:14.99, desc:"Coton bio" }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const productsContainer = document.getElementById("products");
const cartContainer = document.getElementById("cart-items");
const cartCount = document.querySelector("#cart h3");
const cartTotal = document.getElementById("cart-total");

function renderProducts(){
  productsContainer.innerHTML = "";
  sampleProducts.forEach(p=>{
    const article = document.createElement("article");
    article.innerHTML = `
      <div class="product-img">Image</div>
      <h2>${p.title}</h2>
      <p>${p.desc}</p>
      <div class="price-btn">
        <strong>${p.price.toFixed(2)} €</strong>
        <button onclick="addToCart(${p.id})">Ajouter</button>
      </div>
    `;
    productsContainer.appendChild(article);
  });
}

function renderCart(){
  if(cart.length===0){
    cartContainer.innerHTML="<p>Panier vide</p>";
  } else {
    cartContainer.innerHTML="";
    cart.forEach(item=>{
      const div = document.createElement("div");
      div.classList.add("cart-item");
      div.innerHTML=`
        <div>
          <div>${item.title}</div>
          <div>${item.qty} × ${item.price.toFixed(2)} €</div>
        </div>
        <div>
          <button onclick="changeQty(${item.id}, -1)">-</button>
          <button onclick="changeQty(${item.id}, 1)">+</button>
          <button onclick="removeFromCart(${item.id})">Suppr</button>
        </div>
      `;
      cartContainer.appendChild(div);
    });
  }
  cartCount.textContent=`Panier (${cart.reduce((s,c)=>s+c.qty,0)})`;
  cartTotal.textContent=cart.reduce((s,c)=>s+c.price*c.qty,0).toFixed(2)+" €";
}

function addToCart(id){
  const p = sampleProducts.find(x=>x.id===id);
  const found = cart.find(x=>x.id===id);
  if(found){ found.qty++; } else { cart.push({...p, qty:1}); }
  saveCart(); renderCart();
}

function removeFromCart(id){
  cart = cart.filter(x=>x.id!==id); saveCart(); renderCart();
}

function changeQty(id, delta){
  cart = cart.map(x=>x.id===id ? {...x, qty: Math.max(1, x.qty+delta)} : x);
  saveCart(); renderCart();
}

function saveCart(){ localStorage.setItem("cart", JSON.stringify(cart)); }

document.getElementById("checkout-btn").addEventListener("click", ()=>{
  if(cart.length===0) return alert("Votre panier est vide");
  const orders = JSON.parse(localStorage.getItem("orders")) || [];
  const order = { id:Date.now(), items:cart, total:cart.reduce((s,c)=>s+c.price*c.qty,0).toFixed(2), createdAt:new Date().toISOString() };
  localStorage.setItem("orders", JSON.stringify([order,...orders]));
  cart=[]; saveCart(); renderCart();
  alert("Commande simulée enregistrée !");
});

renderProducts(); renderCart();

// Interface utilisateur : inscription / connexion
let isLogin = false;
const userTitle = document.getElementById("user-title");
const userBtn = document.getElementById("user-btn");
const toggleUser = document.getElementById("toggle-user");
toggleUser.addEventListener("click", ()=>{
  isLogin = !isLogin;
  userTitle.textContent = isLogin ? "Connexion" : "Inscription";
  userBtn.textContent = isLogin ? "Se connecter" : "S'inscrire";
  toggleUser.textContent = isLogin ? "Pas de compte ? Inscrivez-vous" : "Vous avez déjà un compte ? Connectez-vous";
});

userBtn.addEventListener("click", ()=>{
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  if(!username || !password){ alert("Veuillez remplir tous les champs."); return; }
  if(!isLogin){
    localStorage.setItem("user_"+username, password);
    alert("Inscription réussie !");
  } else {
    const stored = localStorage.getItem("user_"+username);
    if(stored === password){ alert("Connexion réussie !"); }
    else{ alert("Nom d'utilisateur ou mot de passe incorrect."); }
  }
});
</script>

</body>
</html>
